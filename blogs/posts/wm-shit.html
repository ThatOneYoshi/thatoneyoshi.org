<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuff that happened in WM this month.</title>
    <link rel="icon" href="/media/onekoicon.gif" type="image/gif">
    <link rel="stylesheet" href="/styles.css">
    <script>
        function getRandYoncat() {
            return Math.floor(Math.random() * 9) + 1;
        }

        function randomizeTitle() {
            const titles = [
                "mhm.",
                "WiiMart shit*"
            ];
            const randomIndex = Math.floor(Math.random() * titles.length);
            document.title = titles[randomIndex];
        }

        function randomizeEverything() {
            var img = document.getElementById("YoncatImage");
            if (img) {
                var rand = getRandYoncat();
                img.src = "/media/yoncat" + rand + ".png";
            }
            randomizeTitle();
        }

        window.addEventListener('blur', () => {
            document.title = "later, come back soon :3";
        });

        window.addEventListener('focus', () => {
            randomizeTitle();
        });

        window.onload = randomizeEverything;
    </script>
    <script defer src="/oneko_script.js" data-cat="oneko.gif"></script>
    </head>
